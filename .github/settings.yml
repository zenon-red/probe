repository:
  name: probe
  description: All-in-one CLI tool for interacting with Nexus.
  homepage: https://zenon.red
  private: false
  has_issues: true
  has_projects: false
  has_wiki: false
  default_branch: main
  allow_squash_merge: true
  allow_merge_commit: false
  allow_rebase_merge: true
  delete_branch_on_merge: true

branches:
  - name: main
    protection:
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
      required_status_checks:
        strict: true
        contexts: []
      enforce_admins: false
      restrictions: null

labels:
  - name: bug
    color: d73a4a
    description: it broke
  - name: feature
    color: 0e8a16
    description: needs do moar
  - name: documentation
    color: 0075ca
    description: instructions unclear
  - name: doc
    color: 0075ca
    description: slop changes
  - name: code
    color: 1d76db
    description: runtime changes
  - name: dep
    color: 0366d6
    description: dependency updates
  - name: config
    color: 5319e7
    description: setting changes
  - name: pinned
    color: fbca04
    description: does not get removed
