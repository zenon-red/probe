name: release-binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "@zenon-red/probe@*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            output: probe-linux-x64
          - target: bun-linux-arm64
            output: probe-linux-arm64
          - target: bun-darwin-x64
            output: probe-darwin-x64
          - target: bun-darwin-arm64
            output: probe-darwin-arm64
          - target: bun-windows-x64
            output: probe-windows-x64.exe
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2.1.2
        with:
          bun-version: "1.3.8"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Patch giget for Bun compile
        run: |
          node -e "const fs=require('fs');const p='node_modules/giget/dist/shared/giget.BgKdRmJH.mjs';let s=fs.readFileSync(p,'utf8');s=s.replace(\"import { fetch } from 'node-fetch-native/proxy';\",\"import * as proxyFetchPkg from 'node-fetch-native/proxy';\\nconst { fetch } = proxyFetchPkg;\");fs.writeFileSync(p,s);"

      - name: Generate decoders
        run: bun x tsx scripts/generate-decoders.ts

      - name: Read package metadata
        id: pkg
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          echo "description=$(node -p "JSON.stringify(require('./package.json').description)")" >> "$GITHUB_OUTPUT"

      - name: Build binary
        env:
          PROBE_PKG_VERSION: ${{ steps.pkg.outputs.version }}
          PROBE_PKG_DESCRIPTION: ${{ steps.pkg.outputs.description }}
        run: |
          mkdir -p artifacts
          bun build ./src/index.ts --compile --target=${{ matrix.target }} \
            --define __PROBE_VERSION__="\"${PROBE_PKG_VERSION}\"" \
            --define __PROBE_DESCRIPTION__="${PROBE_PKG_DESCRIPTION}" \
            --outfile=./artifacts/${{ matrix.output }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: artifacts/${{ matrix.output }}

  release:
    if: startsWith(github.ref, 'refs/tags/@zenon-red/probe@')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2.1.2
        with:
          bun-version: "1.3.8"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify skills ref matches zenon-red/skills latest tag
        run: npm run check:skills-ref -- --strict

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: release-assets/*
          generate_release_notes: true
