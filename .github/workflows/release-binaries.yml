name: release-binaries

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            output: probe-linux-x64
          - target: bun-linux-arm64
            output: probe-linux-arm64
          - target: bun-darwin-x64
            output: probe-darwin-x64
          - target: bun-darwin-arm64
            output: probe-darwin-arm64
          - target: bun-windows-x64
            output: probe-windows-x64.exe
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: oven-sh/setup-bun@v2.1.2

      - name: Build binary
        run: |
          mkdir -p artifacts
          bun build ./src/index.ts --compile --target=${{ matrix.target }} --outfile=./artifacts/${{ matrix.output }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.output }}
          path: artifacts/${{ matrix.output }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2.5.0
        with:
          files: release-assets/*
          generate_release_notes: true
