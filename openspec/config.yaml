context: |
  OpenSpec capabilities under `openspec/specs/<capability>/spec.md` (Purpose + Requirements + Scenarios).
  Reference docs: `docs/commands.md`, `docs/nexus.md`, `docs/llms.txt`; contributor notes in `docs/known-gaps.md`, `docs/testing.md`. Change deltas merge into the matching capability on archive/sync.

  Capabilities:
  - probe-cli — CLI output, errors, subcommands, query decode
  - probe-daemon — nexus daemon subscriptions, harness execution
  - probe-token-telemetry — post-run token extraction and STDB columns
  - probe-action-cli — probe action and cooldown commands
  - probe-onboarding — onboard finalize_onboarding step
  - nexus-dispatch — SpacetimeDB central dispatch and peer review (nexus/stdb)
  - nexus-action-metadata — agent_actions run fields and cooldown reducer
